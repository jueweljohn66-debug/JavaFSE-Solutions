<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Community Event Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <!-- jQuery (Exercise 14) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#"><i class="bi bi-calendar-event me-2"></i>Community Portal</a>
    <div class="d-flex gap-2 ms-auto">
      <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Search events...">
    </div>
  </div>
</nav>

<!-- HERO -->
<div class="bg-primary bg-gradient text-white text-center py-5">
  <h1 class="display-5 fw-bold">Local Community Events</h1>
  <p class="lead">Discover, register, and participate in events near you.</p>
</div>

<!-- FILTERS -->
<div class="container mt-4">
  <div class="row g-3 align-items-end">
    <div class="col-md-4">
      <label class="form-label fw-semibold">Filter by Category</label>
      <select id="categoryFilter" class="form-select">
        <option value="all">All Categories</option>
        <option value="music">Music</option>
        <option value="workshop">Workshop</option>
        <option value="sports">Sports</option>
        <option value="food">Food</option>
        <option value="tech">Tech</option>
      </select>
    </div>
    <div class="col-md-4">
      <label class="form-label fw-semibold">Filter by Location</label>
      <select id="locationFilter" class="form-select">
        <option value="all">All Locations</option>
        <option value="downtown">Downtown</option>
        <option value="park">Park</option>
        <option value="community hall">Community Hall</option>
        <option value="online">Online</option>
      </select>
    </div>
    <div class="col-md-4">
      <button class="btn btn-outline-primary w-100" id="addEventBtn" data-bs-toggle="modal" data-bs-target="#addEventModal">
        <i class="bi bi-plus-circle me-1"></i> Add New Event
      </button>
    </div>
  </div>
</div>

<!-- SPINNER (Exercise 9) -->
<div id="loadingSpinner" class="text-center py-5 d-none">
  <div class="spinner-border text-primary" role="status"></div>
  <p class="mt-2 text-muted">Loading events...</p>
</div>

<!-- EVENTS GRID -->
<div class="container mt-4">
  <div class="row g-4" id="eventsContainer"></div>
  <p id="noEvents" class="text-center text-muted py-5 d-none">No events found.</p>
</div>

<!-- REGISTRATION FORM (Exercise 11) -->
<div class="container mt-5 mb-5">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h4 class="mb-4"><i class="bi bi-person-plus me-2"></i>Register for an Event</h4>
      <form id="registrationForm" novalidate>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input type="text" id="regName" class="form-control" placeholder="Your name">
            <div class="invalid-feedback" id="nameError"></div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Email Address</label>
            <input type="email" id="regEmail" class="form-control" placeholder="you@example.com">
            <div class="invalid-feedback" id="emailError"></div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Select Event</label>
            <select id="regEvent" class="form-select">
              <option value="">-- Choose an Event --</option>
            </select>
            <div class="invalid-feedback" id="eventError"></div>
          </div>
          <div class="col-md-6 d-flex align-items-end">
            <button type="submit" class="btn btn-primary w-100" id="registerBtn">
              <i class="bi bi-check-circle me-1"></i> Register Now
            </button>
          </div>
        </div>
        <div id="formMessage" class="mt-3 d-none"></div>
      </form>
    </div>
  </div>
</div>

<!-- ADD EVENT MODAL -->
<div class="modal fade" id="addEventModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add New Event</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="addEventForm">
          <div class="mb-3">
            <label class="form-label">Event Name</label>
            <input type="text" id="newEventName" class="form-control" placeholder="e.g. Jazz in the Park">
          </div>
          <div class="mb-3">
            <label class="form-label">Category</label>
            <select id="newEventCategory" class="form-select">
              <option value="music">Music</option>
              <option value="workshop">Workshop</option>
              <option value="sports">Sports</option>
              <option value="food">Food</option>
              <option value="tech">Tech</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Location</label>
            <input type="text" id="newEventLocation" class="form-control" placeholder="e.g. Downtown">
          </div>
          <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" id="newEventDate" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Available Seats</label>
            <input type="number" id="newEventSeats" class="form-control" value="50" min="1">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" id="saveEventBtn">Add Event</button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST NOTIFICATION -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
  <div id="toastMsg" class="toast align-items-center text-white bg-success border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastText">Registered successfully!</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<footer class="bg-dark text-white text-center py-3 mt-5">
  <small>Community Event Portal &mdash; JavaScript Exercises 1–14</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Exercise 1: External JS file -->
<script src="main.js"></script>
</body>
</html>
