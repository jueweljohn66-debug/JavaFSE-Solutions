<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 17 - Bootstrap Icons</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<!-- Exercise 17.1 – Social Icons in Footer -->
<nav class="navbar navbar-dark bg-dark px-4">
  <a class="navbar-brand" href="#">MySite</a>
</nav>

<div class="container mt-5">
  <h2>Exercise 17.2 – Icon-only Buttons</h2>
  <div class="d-flex gap-2 mt-3">
    <button class="btn btn-primary" title="Search"><i class="bi bi-search"></i></button>
    <button class="btn btn-success" title="Add"><i class="bi bi-plus-circle"></i></button>
    <button class="btn btn-danger" title="Delete"><i class="bi bi-trash"></i></button>
    <button class="btn btn-warning" title="Edit"><i class="bi bi-pencil"></i></button>
    <button class="btn btn-info" title="Download"><i class="bi bi-download"></i></button>
    <button class="btn btn-dark" title="Settings"><i class="bi bi-gear"></i></button>
  </div>

  <h4 class="mt-5">Icon Sizes</h4>
  <div class="d-flex gap-3 align-items-center mt-3">
    <i class="bi bi-heart-fill text-danger fs-6"></i>
    <i class="bi bi-heart-fill text-danger fs-4"></i>
    <i class="bi bi-heart-fill text-danger fs-2"></i>
    <i class="bi bi-heart-fill text-danger fs-1"></i>
  </div>
</div>

<!-- Exercise 17.1 – Social Icons Footer -->
<footer class="bg-dark text-white mt-5 py-4">
  <div class="container text-center">
    <p class="mb-3">Follow us on social media</p>
    <div class="d-flex justify-content-center gap-3 fs-4">
      <a href="#" class="text-white"><i class="bi bi-facebook"></i></a>
      <a href="#" class="text-white"><i class="bi bi-twitter-x"></i></a>
      <a href="#" class="text-white"><i class="bi bi-instagram"></i></a>
      <a href="#" class="text-white"><i class="bi bi-linkedin"></i></a>
      <a href="#" class="text-white"><i class="bi bi-youtube"></i></a>
      <a href="#" class="text-white"><i class="bi bi-github"></i></a>
    </div>
    <p class="mt-3 text-muted small">&copy; 2024 MySite. All rights reserved.</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
