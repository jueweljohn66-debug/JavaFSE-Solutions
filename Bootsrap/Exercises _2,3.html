<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 3 - Responsive Grid Layout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .col-box { background: #0d6efd; color: white; padding: 20px; text-align: center; border-radius: 6px; margin-bottom: 10px; }
  </style>
</head>
<body>
<div class="container mt-4">
  <h2>Exercise 3.1 – Responsive 3-Column Grid</h2>
  <p>Stacks on mobile, 2-per-row on tablet, 3-per-row on desktop.</p>
  <div class="row">
    <div class="col-12 col-md-6 col-lg-4"><div class="col-box">Column 1</div></div>
    <div class="col-12 col-md-6 col-lg-4"><div class="col-box">Column 2</div></div>
    <div class="col-12 col-md-6 col-lg-4"><div class="col-box">Column 3</div></div>
  </div>

  <h2 class="mt-5">Exercise 3.2 – Container, Row, Col Classes</h2>
  <div class="row g-3">
    <div class="col-sm-6 col-md-4"><div class="col-box">col-sm-6 col-md-4</div></div>
    <div class="col-sm-6 col-md-4"><div class="col-box">col-sm-6 col-md-4</div></div>
    <div class="col-sm-6 col-md-4"><div class="col-box">col-sm-6 col-md-4</div></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
