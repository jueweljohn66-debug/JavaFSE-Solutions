<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 4 - Column Layouts</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .sidebar { background: #198754; color: white; padding: 20px; min-height: 200px; border-radius: 6px; }
    .content { background: #0dcaf0; padding: 20px; min-height: 200px; border-radius: 6px; }
    .eq-col { background: #fd7e14; color: white; text-align: center; padding: 20px; border-radius: 6px; margin-bottom: 10px; }
  </style>
</head>
<body>
<div class="container mt-4">
  <h2>Exercise 4.1 – Sidebar (col-md-3) + Content (col-md-9)</h2>
  <div class="row g-3 mt-2">
    <div class="col-md-3"><div class="sidebar"><h5>Sidebar</h5><p>col-md-3</p></div></div>
    <div class="col-md-9"><div class="content"><h5>Main Content</h5><p>col-md-9 — This area takes up 9 of 12 columns on medium+ screens.</p></div></div>
  </div>

  <h2 class="mt-5">Exercise 4.2 – Four Equal Columns (col-sm-3)</h2>
  <div class="row g-3 mt-2">
    <div class="col-sm-3"><div class="eq-col">Col 1</div></div>
    <div class="col-sm-3"><div class="eq-col">Col 2</div></div>
    <div class="col-sm-3"><div class="eq-col">Col 3</div></div>
    <div class="col-sm-3"><div class="eq-col">Col 4</div></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
