<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 8 - Forms</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">

  <!-- Exercise 8.1 – Registration Form -->
  <h2>Exercise 8.1 – Registration Form</h2>
  <form class="mt-3" style="max-width:500px">
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-control" placeholder="Enter your name">
    </div>
    <div class="mb-3">
      <label class="form-label">Email address</label>
      <input type="email" class="form-control" placeholder="name@example.com">
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <!-- input-group example -->
      <div class="input-group">
        <span class="input-group-text"><i>🔒</i></span>
        <input type="password" class="form-control" placeholder="Create password">
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Gender</label><br>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="gender" id="male">
        <label class="form-check-label" for="male">Male</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="gender" id="female">
        <label class="form-check-label" for="female">Female</label>
      </div>
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" id="agree">
      <label class="form-check-label" for="agree">I agree to the Terms &amp; Conditions</label>
    </div>
    <button type="submit" class="btn btn-primary w-100">Register</button>
  </form>

  <hr class="my-5">

  <!-- Exercise 8.2 – Login Form with form-floating -->
  <h2>Exercise 8.2 – Login Form (form-floating)</h2>
  <form class="mt-3" style="max-width:400px">
    <div class="form-floating mb-3">
      <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com">
      <label for="loginEmail">Email address</label>
    </div>
    <div class="form-floating mb-3">
      <input type="password" class="form-control" id="loginPassword" placeholder="Password">
      <label for="loginPassword">Password</label>
    </div>
    <button class="btn btn-success w-100">Login</button>
  </form>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
