<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>

.gallery-img{
    width:200px;
    height:150px;
    border:2px solid black;
}

table{
    border-collapse: collapse;
}

td{
    padding:10px;
    text-align:center;
}

</style>

<title>Image Gallery</title>
</head>
<body>

<table>

<caption>
Community Event Gallery
</caption>

<tr>
<td>
<img src="music.jpg"
     alt="Music Fest"
     title="Music Fest"
     class="gallery-img">
<p>Music Festival</p>
</td>

<td>
<img src="workshop.jpg"
     alt="Workshop"
     title="Workshop"
     class="gallery-img">
<p>Workshop</p>
</td>

<td>
<img src="marathon.jpg"
     alt="Marathon"
     title="Marathon"
     class="gallery-img">
<p>Marathon</p>
</td>
</tr>

<tr>
<td>
<img src="art.jpg"
     alt="Art Fair"
     title="Art Fair"
     class="gallery-img">
<p>Art Fair</p>
</td>

<td>
<img src="food.jpg"
     alt="Food Carnival"
     title="Food Carnival"
     class="gallery-img">
<p>Food Festival</p>
</td>

<td>
<img src="city.jpg"
     alt="City Celebration"
     title="City Celebration"
     class="gallery-img">
<p>City Celebration</p>
</td>
</tr>

</table>

</body>
</html>
