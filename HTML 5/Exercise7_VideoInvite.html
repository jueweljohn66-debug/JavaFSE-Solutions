<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Invite</title>
</head>
<body>

<video controls width="400"
       oncanplay="videoReady()">

<source src="promo.mp4"
        type="video/mp4">

</video>

<p id="message"></p>

<script>

function videoReady(){

document.getElementById("message")
.innerHTML=
"Video Ready To Play";

}

window.onbeforeunload=function(){
return "Form not completed";
};

</script>

</body>
</html>
