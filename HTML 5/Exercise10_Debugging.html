<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Debugging Example</title>
</head>
<body>

<button onclick="debugCode()">
Run Debug
</button>

<script>

function debugCode(){

"Debugging Started"
);

let userName =
"Resident";

debugger;

console.log(
"User Name : " +
userName
);

}

</script>

</body>
</html>
